<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>Gol tube</title>
</head>
<body>
<div class="container">
    <header>
        <nav>
            <a href="/">Gol tube</a>
        </nav>
    </header>

    <main>
        <div class="hero">
            <h1>Welcome to Gol tube</h1>
            <p>Your go-to platform for downloading YouTube videos easily and quickly.</p>
        </div>

        <!-- the field to input the url -->
        <div class="inputField">
            <input type="text" id="urlInput" name="url" placeholder="Enter YouTube URL" required>
        </div>

        <!-- Message display -->
        <div id="message" style="display: none; color: red; text-align: center; margin: 10px; font-weight: bold;"></div>

        <!-- the preview section -->
        <!-- preview loading animation -->
        <div id="loadingPreview" style="display: none;">
            <h2>Loading Preview...</h2>
            <div class="loader"></div>
        </div>

        <div id="previewSection" class="previewSection" style="display: none;">
            <h2>Video Preview</h2>
            <div id="videoPreview">
                <!-- Video preview will be displayed here -->
            </div>
        </div>

        <!-- Display error message if any -->
        <div class="popupMessage">
            if {{ message }}:
            <div>
                {{ message }}
            </div>
            endif
        </div>

        <!-- Download options -->
        <div id="popupModel" class="DownloadOptions" style="display: none;">
            <form name="optionsForm" action="/download" method="post">
                <label for="format">Choose a format:</label>
                <select name="format" id="format">
                    <option value="mp4">MP4</option>
                    <option value="mp3">MP3</option>
                    <option value="webm">WEBM</option>
                </select>

                <select name="quality" id="vid-quality">
                    <option value="best">Best</option>
                    <option value="720p">720p</option>
                    <option value="1080p">1080p</option>
                    <option value="worst">Worst</option>
                </select>

                <label for="audio_only">Audio Only</label>
                <input type="checkbox" id="audio_only" name="audio_only" value="yes">

                <input type="hidden" id="hiddenUrl" name="url">

                <button type="button" onclick="downloadVideo()">Start Download</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2024 Gol tube. All rights reserved.</p>
    </footer>


</body>
</html>

<script>
    // function to show loading animation
    function loadingAnimation() {
        console.log('Showing loading animation');
        document.getElementById('loadingPreview').style.display = 'block';
        document.getElementById('previewSection').style.display = 'none';
        document.getElementById('popupModel').style.display = 'none';
    }
    
    // function to check if the URL is valid
    function checkValidURL(url) {
        const pattern = /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\/.+$/;
        return pattern.test(url);
    }   

    // function to preview video
    function previewVideo() {
        const url = document.querySelector('input[name="url"]').value;
        console.log('Starting preview for URL:', url);
        if (!url) {
            showMessage("Please enter a YouTube URL.");
            return;
        }

        fetch('/preview', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `url=${encodeURIComponent(url)}`
        })
        .then(response => {
            console.log('Response status:', response.status);
            return response.json();
        })
        .then(data => {
            console.log('Received data:', data);
            if (data.error) {
                showMessage(data.error);
                return;
            }
            const previewDiv = document.getElementById('videoPreview');
            previewDiv.innerHTML = `
                <h3>${data.title}</h3>
                <img src="${data.thumbnail}" alt="Video Thumbnail">
                <p>Duration: ${data.duration} seconds</p>
            `;
            // Set the hidden URL field value
            document.getElementById('hiddenUrl').value = url;

            // Hide loading, show preview and options
            document.getElementById('loadingPreview').style.display = 'none';
            document.getElementById('previewSection').style.display = 'block';
            document.getElementById('popupModel').style.display = 'block';
        })
        .catch(error => {
            console.error('Error:', error);
            showMessage("Failed to fetch video preview.");
            document.getElementById('loadingPreview').style.display = 'none';
        });
    }

    // function to download video
    function downloadVideo() {
    const form = document.forms.optionsForm;
    const url = form.url.value;
    const format = form.format.value;
    const quality = form.quality.value;
    const audioOnly = form.audio_only.checked;

    if (!url) {
        showMessage("Please enter a YouTube URL.");
        return;
    }

    const downloadButton = form.querySelector('button');
    downloadButton.disabled = true;
    downloadButton.textContent = 'Downloading...';

    const formData = new FormData(form);

    fetch('/download', {
        method: 'POST',
        body: formData,
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            const downloadLink = document.createElement('a');
            downloadLink.href = `/downloads/${data.filename}`;
            downloadLink.textContent = `Download ${data.filename}`;
            downloadLink.setAttribute('download', '');
            
            const messageDiv = document.getElementById('videoPreview');
            messageDiv.appendChild(downloadLink);
            
            downloadLink.click(); // Automatically start the download
        } else {
            showMessage(`Error: ${data.error}`);
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showMessage("An unexpected error occurred.");
    })
    .finally(() => {
        downloadButton.disabled = false;
        downloadButton.textContent = 'Start Download';
    });
}

    // function to handle download options pop up
    function downloadOptions() {
        const url = document.querySelector('input[name="url"]').value;
        console.log('Download options for URL:', url);
        if (!checkValidURL(url)) {
            alert("Please enter a valid YouTube URL.");
            return;
        } else {
            console.log("Loading preview video...");
            loadingAnimation();
            previewVideo();
        }
    }

// function to show message
    function showMessage(message) {
        const messageDiv = document.getElementById('message');
        messageDiv.textContent = message;
        messageDiv.style.display = 'block';
        setTimeout(() => {
            messageDiv.style.display = 'none';
        }, 5000);
    }

    // Auto-load preview on URL input
    document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('urlInput').addEventListener('input', function() {
            const url = this.value.trim();
            if (checkValidURL(url)) {
                console.log('Valid URL entered, loading preview');
                loadingAnimation();
                previewVideo();
            } else {
                console.log('Invalid URL, hiding preview');
                document.getElementById('loadingPreview').style.display = 'none';
                document.getElementById('previewSection').style.display = 'none';
                document.getElementById('popupModel').style.display = 'none';
            }
        });
    });
</script>
