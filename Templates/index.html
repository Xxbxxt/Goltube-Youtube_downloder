<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="static/style.css">
    <title>Gol tube</title>
</head>
<body>
<div class="container">
    <header>
        <nav>
            <a href="/" style="color: white; text-decoration: none; font-size: 24px;">Gol tube</a>
        </nav>
    </header>


    <main>
    <div class="hero" style="text-align: center; margin-top: 50px;">
        <h1>Welcome to Gol tube</h1>
        <p>Your go-to platform for downloading YouTube videos easily and quickly.</p>
    </div>

    <!-- the field to input the url -->
    <div class="inputField" style="text-align: center; margin-top: 30px;" >
            <input type="text" name="url" placeholder="Enter YouTube URL" required>
            <button type="submit" onclick="downloadOptions()">Download</button>
    </div>


    <!-- Display error message if any -->
    <div style="padding: 20px; text-align: center; display: none;">
        if {{ message }}:
        <div style="text-align: center; margin-top: 20px; color: red;">
            {{ message }} 
        </div>
        endif  
    </div>

    <!-- Download options -->
    <div id="popupModel" style="padding: 20px; text-align: center; display: none;">
        <form name="optionsForm" action="/download" method="post">
            <label for="format">Choose a format:</label>
            <select name="format" id="format">
                <option value="mp4">MP4</option>
                <option value="mp3">MP3</option>
                <option value="webm">WEBM</option>
            </select>

            <select name="quality" id="vid-quality">
                <option value="best">Best</option>
                <option value="720p">720p</option>
                <option value="1080p">1080p</option>
                <option value="worst">Worst</option>
            </select>

            <label for="audio_only">Audio Only</label>
            <input type="checkbox" id="audio_only" name="audio_only" value="yes">

            <input type="hidden" id="hiddenUrl" name="url">

            <button type="submit" onclick="downloadVideo()" >Download Selected Format</button>
        </form>
    </div>

    </main>

    <footer>
        <p>&copy; 2024 Gol tube. All rights reserved.</p>
    </footer>


</body>
</html>

<script>

    function downloadVideo() {
        const url = document.querySelector('input[name="url"]').value;
        const format = document.getElementById('format').value;
        const quality = document.getElementById('vid-quality').value;
        const audioOnly = document.getElementById('audio_only').checked;
        document.getElementById('hiddenUrl').value = url;

        if (!url) {
            alert("Please enter a YouTube URL.");
            return;
        }
        // You can add more validation for the URL format here if needed

        // Submit the form
        document.querySelector('form').submit();
    }

    // function to handle download options pop up
    function downloadOptions() {
        const format = document.getElementById('popupModel').style.display = 'block';

        if (!format) {
            showMessage("No download formats available.");
        }

    }

    function showMessage(message) {
        const messageDiv = document.createElement('div');
        messageDiv.style.textAlign = 'center';
        messageDiv.style.marginTop = '20px';
        messageDiv.style.color = 'red';
        messageDiv.textContent = message;
        document.body.appendChild(messageDiv);
    }
</script>
